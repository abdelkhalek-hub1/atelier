name: CI – LangGraph Wikipedia Workflow

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch: {}   # Allow manual trigger from the GitHub UI

env:
  PYTHON_VERSION: "3.11"
  # Disable real LangSmith calls in CI
  LANGSMITH_TRACING: "false"
  LANGCHAIN_TRACING_V2: "false"
  # Disable real Gemini calls in CI (tests use offline fallback)
  GEMINI_API_KEY: ""
  # Override DLQ URL so tests never hit a real webhook
  DLQ_WEBHOOK_URL: "https://webhook.site/langgraph-dlq"

jobs:
  # =========================================================================
  # Job 1: Lint & type-check
  # =========================================================================
  lint:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy types-requests

      - name: "Run ruff linter"
        run: ruff check app/ tests/

      - name: "Run mypy type checker"
        run: mypy app/ --ignore-missing-imports --strict-optional

  # =========================================================================
  # Job 2: Unit & Integration tests
  # =========================================================================
  test:
    name: "Pytest – Unit & Integration"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Run pytest with coverage"
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junit-xml=test-report.xml \
            -v
        # The step fails automatically if any test fails (exit code ≠ 0)

      - name: "Upload JUnit XML test report"
        uses: actions/upload-artifact@v4
        if: always()   # Upload even on test failure
        with:
          name: test-report
          path: test-report.xml
          retention-days: 30

      - name: "Upload coverage report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

      - name: "Publish test results"
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-report.xml
          check_name: "Pytest Results"
          comment_title: "Test Results"

  # =========================================================================
  # Job 3: Generate workflow documentation
  # =========================================================================
  docs:
    name: "Generate Workflow Docs"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Validate docs/workflow.json is well-formed JSON"
        run: python -c "import json; json.load(open('docs/workflow.json'))"

      - name: "Upload docs artefact"
        uses: actions/upload-artifact@v4
        with:
          name: workflow-docs
          path: docs/
          retention-days: 90
