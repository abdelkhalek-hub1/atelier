[tool.pytest.ini_options]
# ---------------------------------------------------------------------------
# Test discovery
# ---------------------------------------------------------------------------
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
addopts = [
    "-v",                          # verbose test names
    "--tb=short",                  # compact tracebacks
    "--strict-markers",            # fail on unknown markers
    "--no-header",
    "--color=yes",
    "--cov=app",                   # coverage for the app package
    "--cov-report=term-missing",   # show uncovered lines in terminal
    "--cov-report=xml:coverage.xml",
    "--junit-xml=test-report.xml", # JUnit XML for GitHub Actions
]

# ---------------------------------------------------------------------------
# Markers
# ---------------------------------------------------------------------------
markers = [
    "unit: fast, isolated unit tests",
    "integration: tests that invoke the full workflow graph",
    "slow: tests that may take >1 s",
]

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_cli = true
log_cli_level = "WARNING"
log_format = "%(asctime)s %(levelname)s %(name)s: %(message)s"
